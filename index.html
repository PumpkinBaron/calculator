<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="javascript.js" defer></script>
 </head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="display-contents"></div>
        </div>
        <div class="buttons">
            <div class="numbers">
                <div class="nlineone">
                    <button id="b7">7</button>
                    <button id="b8">8</button>
                    <button id="b9">9</button>
                </div>
                <div class="nlinetwo">
                    <button id="b4">4</button>
                    <button id="b5">5</button>
                    <button id="b6">6</button>
                </div>
                <div class="nlinethree">
                    <button id="b1">1</button>
                    <button id="b2">2</button>
                    <button id="b3">3</button>
                </div>
                <div class="nlinefour">
                    <button class="zero" id="b0">0</button>
                </div>
            </div>
            <div class="operators">
                <div class="olineone">
                    <button id="bClear">C</button>
                    <button id="bEnter">=</button>
                </div>
                <div class="olinetwo">
                    <button id="b+">+</button>
                    <button id="b-">−</button> 
                </div>
                <div class="olinethree">
                    <button id="b*">×</button>
                    <button id="b/">÷</button> 
                </div>
                <div class="olinefour">
                    <button class="backspace" id="bDelete">Backspace</button> 
                </div>

            </div>
        </div>
    </div>
    
</body>
</html>
